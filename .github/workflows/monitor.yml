name: Frontend Monitoring (dev / qa / pre-prod)

on:
  # Scheduling is driven by cron-job.org (job id 7492124), which POSTs
  # workflow_dispatch to this repo every 5 min. GitHub Actions' own cron
  # is unreliable on free tier — it was dropping scheduled runs for 40+
  # minutes, tripping the Checkly heartbeats with false alerts.
  workflow_dispatch:

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    name: Check (attempt 1)
    runs-on: ubuntu-latest
    # 2-min hard cap per attempt. If we blow past this (stuck Playwright,
    # cold cache + slow network, etc.), the job fails and retry-check fires.
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run monitoring checks
        env:
          HEARTBEAT_DEV_URL: ${{ secrets.HEARTBEAT_DEV_URL }}
          HEARTBEAT_QA_URL: ${{ secrets.HEARTBEAT_QA_URL }}
          HEARTBEAT_PREPROD_URL: ${{ secrets.HEARTBEAT_PREPROD_URL }}
        run: npx tsx src/monitor/run.ts

  retry-check:
    name: Check (retry, runs only if attempt 1 failed)
    needs: check
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run monitoring checks
        env:
          HEARTBEAT_DEV_URL: ${{ secrets.HEARTBEAT_DEV_URL }}
          HEARTBEAT_QA_URL: ${{ secrets.HEARTBEAT_QA_URL }}
          HEARTBEAT_PREPROD_URL: ${{ secrets.HEARTBEAT_PREPROD_URL }}
        run: npx tsx src/monitor/run.ts
