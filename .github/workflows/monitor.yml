name: Frontend Monitoring (dev / qa / pre-prod)

on:
  # Scheduling is driven by cron-job.org (job id 7492124), which POSTs
  # workflow_dispatch to this repo every 5 min. GitHub Actions' own cron
  # is unreliable on free tier — it was dropping scheduled runs for 40+
  # minutes, tripping the Checkly heartbeats with false alerts.
  workflow_dispatch:

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    # Hard cap: ~45s setup (checkout + node + npm ci + playwright cache) plus
    # up to 2 × 2-min monitoring attempts = ~4m45s. 6 min gives a small buffer.
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Chromium
        # ubuntu-latest already ships every library Playwright needs, so we skip
        # --with-deps (which installs ~21 MB of font packages via apt and pushes
        # the step past a 5-min timeout). Cache above makes this step a no-op
        # after the first run per package-lock.json.
        run: npx playwright install chromium

      - name: Run monitoring checks
        # 2-min timeout per attempt, retry once on timeout or non-zero exit.
        # A stuck run is killed and re-tried so we don't eat into the next
        # scheduled 5-min cycle.
        uses: nick-fields/retry@v3
        env:
          HEARTBEAT_DEV_URL: ${{ secrets.HEARTBEAT_DEV_URL }}
          HEARTBEAT_QA_URL: ${{ secrets.HEARTBEAT_QA_URL }}
          HEARTBEAT_PREPROD_URL: ${{ secrets.HEARTBEAT_PREPROD_URL }}
        with:
          timeout_minutes: 2
          max_attempts: 2
          command: npx tsx src/monitor/run.ts
